maintainers:
  - github: shinnkka
    email: shinka@archlinuxcn.org

pre_build_script: aur_pre_build(maintainers=['sola'])
post_build: aur_post_build

update_on:
  - source: aur
  - source: alpmfiles
    pkgname: hyprlang
    filename: 'usr/lib/libhyprlang\.so\.(\d+)'
  - source: alpmfiles
    pkgname: hyprutils
    filename: 'usr/lib/libhyprutils\.so\.(\d+)'
  - source: alpm
    alpm: qt6-base
    from_pattern: '^(\d+\.\d+\.\d+)\..*'
    to_pattern: '\1'
    strip_release: true
