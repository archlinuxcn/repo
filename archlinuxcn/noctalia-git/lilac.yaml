maintainers:
  - github: shinnkka
    email: shinka@archlinuxcn.org

build_prefix: extra-x86_64

pre_build_script: |
  update_pkgrel()
  vcs_update()
  aur_pre_build(maintainers=['noctalia-dev'])

post_build_script: |
  git_pkgbuild_commit()
  aur_post_build


update_on:
  - source: aur
    aur: noctalia-git
  - source: github
    github: noctalia-dev/noctalia

