maintainers:
  - github: Kimiblock

pre_build_script: update_pkgver_and_pkgrel(_G.newver)
post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()

update_on:
  - source: "github"
    github: "vitejs/vite"
    include_prereleases: false
    include_regex: "v.*"
    prefix: "v"
build_prefix: extra-x86_64