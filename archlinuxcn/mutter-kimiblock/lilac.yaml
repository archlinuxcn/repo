maintainers:
  - github: Kimiblock

pre_build_script: update_pkgver_and_pkgrel(_G.newver)
post_build_script: |
  git_pkgbuild_commit()
#  update_aur_repo()

update_on:
  - source: "git"
    github: "https://gitlab.gnome.org/GNOME/mutter.git"
    include_regex: '\d+(\.\d+)*'
    from_pattern: '\.([a-z])'
    to_pattern: '\1'
build_prefix: extra-x86_64