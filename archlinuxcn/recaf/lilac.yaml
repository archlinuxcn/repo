maintainers:
  - github: Yurzi

build_prefix: extra-x86_64

pre_build_script: |
  import re
  # upstream 4.x tags carry an -alpha suffix (e.g. 4.0.0-alpha); strip it for pkgver
  update_pkgver_and_pkgrel(re.sub(r'-alpha$', '', _G.newver))

post_build_script: |
  git_pkgbuild_commit()

update_on:
  - source: github
    github: Col-E/Recaf
    use_latest_tag: true
    include_regex: '.*-alpha'
