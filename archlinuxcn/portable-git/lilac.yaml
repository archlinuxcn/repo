maintainers:
  - github: Kimiblock
    email: kimiblock@icloud.com

build_prefix: extra-x86_64

pre_build_script: |
  update_pkgrel()
  vcs_update()
post_build_script: |
  git_pkgbuild_commit()
  update_aur_repo()

update_on:
  - source: github
    github: Kraftland/portable
    strip_release: true
  - source: alpm
    alpm: systemd-libs
    provided: libudev.so
  - source: alpm
    alpm: glibc
  - source: alpm
    alpm: libgcc
    provided: libgcc_s.so
repo_depends:
  - portable-packer