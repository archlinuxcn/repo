maintainers:
  - github: everyx

pre_build_script: update_pkgver_and_pkgrel(_G.newver)
post_build_script: git_pkgbuild_commit()

update_on:
  - source: github
    github: rime/librime
    use_max_tag: true

  - source: alpm
    alpm: boost
    repo: extra
    from_pattern: '^(\d+\.\d+.\d+).*'
    to_pattern: '\1'

  - source: alpm
    alpm: capnproto
    repo: extra
    from_pattern: '^(\d+\.\d+.\d+).*'
    to_pattern: '\1'

  - source: alpm
    alpm: leveldb
    repo: extra
    from_pattern: '^(\d+).*'
    to_pattern: '\1'

  - source: alpm
    alpm: marisa
    repo: extra
    from_pattern: '^(\d+).*'
    to_pattern: '\1'

  - source: alpm
    alpm: opencc
    repo: extra
    from_pattern: '^(\d+\.\d+).*'
    to_pattern: '\1'

  - source: alpm
    alpm: yaml-cpp
    repo: extra
    from_pattern: '^(\d+\.\d+).*'
    to_pattern: '\1'
