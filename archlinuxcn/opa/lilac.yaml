build_prefix: extra-x86_64
pre_build_script: update_pkgver_and_pkgrel(_G.newver)
post_build_script: |
  git_pkgbuild_commit()
#  update_aur_repo()
update_on:
  - source: aur
    aur: "opa"
  - source: "github"
    github: "open-policy-agent/opa"
    use_latest_release: true
    include_prereleases: false
    prefix: "v"

maintainers:
  - github: Kimiblock

managed: true